<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tea Factory Entry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ CSS LINK (VERY IMPORTANT) -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="container">
    <h2>Tea Factory Entry</h2>

    <form id="teaForm">

      <div class="field">
        <label for="farmer">Farmer Name</label>
        <input type="text" id="farmer" required />
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required />
      </div>

      <div class="field">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" step="0.1" required />
      </div>

      <div class="field">
        <label for="grade">Tea Grade</label>
        <select id="grade" required>
          <option value="">Select grade</option>
          <option value="A">Grade A</option>
          <option value="B">Grade B</option>
          <option value="C">Grade C</option>
        </select>
      </div>

      <button type="submit">Submit Entry</button>
    </form>
  </div>

  <!-- ✅ YOUR SCRIPT (UNCHANGED LOGIC) -->
  <script>
    console.log("Inline script loaded");

    const supabase = supabaseJs.createClient(
      "https://qjcjlavjgzhamigpchep.supabase.co",
      "YOUR_PUBLIC_ANON_KEY"
    );

    const form = document.getElementById("teaForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!navigator.onLine) {
        alert("No internet connection. Data not saved.");
        return;
      }

      const farmer = document.getElementById("farmer").value;
      const phone = document.getElementById("phone").value;
      const weight = document.getElementById("weight").value;
      const grade = document.getElementById("grade").value;

      const { error } = await supabase
        .from("tea_stock")
        .insert([
          {
            farmer_name: farmer,
            phone: phone,
            weight_kg: weight,
            grade: grade
          }
        ]);

      if (error) {
        console.error(error);
        alert("Insert failed");
      } else {
        alert("Inserted successfully");
        form.reset();
      }
    });
  </script>

</body>
</html>
